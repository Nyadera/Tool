<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>連絡先 - Tool</title>
  <meta name="theme-color" content="#f7f8fb" id="meta-theme-color" />
  <style>
    :root{
      --bg: #f7f8fb;
      --surface: #ffffff;
      --text: #111827;
      --muted: #6b7280;
      --accent: #2563eb;
      --border: #e6e9ef;
    }
    :root[data-theme="dark"]{
      --bg: #071025;
      --surface: #0f1724;
      --text: #e6eef8;
      --muted: #9aa6b2;
      --accent: #60a5fa;
      --border: rgba(255,255,255,0.06);
    }

    html,body{height:100%;margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,"Hiragino Kaku Gothic ProN","Noto Sans JP",sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;}
    .container{max-width:820px;margin:24px auto;padding:20px;background:var(--surface);border:1px solid var(--border);border-radius:10px;box-sizing:border-box;}
    h1{margin-top:0;color:var(--accent);}
    p,li{color:var(--text);line-height:1.6}
    .contact-card{padding:12px;border-radius:8px;background:var(--muted-surface,transparent);border:1px dashed var(--border)}
    footer p{color:var(--muted);font-size:0.9rem}
  </style>
</head>
<body>
  <main class="container" id="main">
    <header>
      <h1>連絡先</h1>
      <p>ご意見・不具合報告はこちらからどうぞ</p>
    </header>

    <article>
      <h2>Discord</h2>
      <p>連絡する場合は以下の名前へお願いします</p>
      <div class="contact-card" role="region" aria-label="連絡先情報">
        <p><strong>表示名</strong> : nyade</p>
        <p><strong>ユーザー名</strong> : nyadera</p>
      </div>
    </article>
  </main>

  <script>
    (function () {
      function applyTheme(theme) {
        if (theme === 'dark') {
          document.documentElement.setAttribute('data-theme', 'dark');
          const meta = document.querySelector('meta[name="theme-color"]');
          if (meta) meta.setAttribute('content', '#071025');
        } else {
          document.documentElement.removeAttribute('data-theme');
          const meta = document.querySelector('meta[name="theme-color"]');
          if (meta) meta.setAttribute('content', '#f7f8fb');
        }
      }

      window.addEventListener('message', (ev) => {
        try {
          if (ev.origin !== location.origin) return;
        } catch (err) {}
        const data = ev.data || {};
        if (data && data.type === 'theme') {
          applyTheme(data.theme);
        }
        if (data && data.type === 'request-height') {
          const h = document.documentElement.scrollHeight || document.body.scrollHeight;
          parent.postMessage({ type: 'resize', height: h }, location.origin);
        }
      });

      window.addEventListener('load', () => {
        try { parent.postMessage({ type: 'request-theme' }, location.origin); } catch (err) {}
        const h = document.documentElement.scrollHeight || document.body.scrollHeight;
        try { parent.postMessage({ type: 'resize', height: h }, location.origin); } catch (err) {}
      });

      const ro = new MutationObserver(() => {
        const h = document.documentElement.scrollHeight || document.body.scrollHeight;
        try { parent.postMessage({ type: 'resize', height: h }, location.origin); } catch (err) {}
      });
      ro.observe(document.body, { childList: true, subtree: true, attributes: true, characterData: true });
    })();
  </script>
</body>
</html>
