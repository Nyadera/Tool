<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>概要 - Tool</title>
  <meta name="theme-color" content="#f7f8fb" id="meta-theme-color" />
  <style>
    :root{
      --bg: #f7f8fb;
      --surface: #ffffff;
      --text: #111827;
      --muted: #6b7280;
      --accent: #2563eb;
      --border: #e6e9ef;
    }
    :root[data-theme="dark"]{
      --bg: #071025;
      --surface: #0f1724;
      --text: #e6eef8;
      --muted: #9aa6b2;
      --accent: #60a5fa;
      --border: rgba(255,255,255,0.06);
    }

    html,body{height:100%;margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,"Hiragino Kaku Gothic ProN","Noto Sans JP",sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;}
    .container{max-width:980px;margin:24px auto;padding:20px;background:var(--surface);border:1px solid var(--border);border-radius:10px;box-sizing:border-box;}
    h1{margin-top:0;color:var(--accent);}
    h2{color:var(--text);}
    p,li{color:var(--text);line-height:1.6}
    footer p{color:var(--muted);font-size:0.9rem}
    a{color:var(--accent)}
  </style>
</head>
<body>
  <main class="container" id="main">
    <header>
      <h1>概要</h1>
      <p>ウェブ上で公開するツール群を纏める為のものです。各ツールは上メニューから選択して下側に表示されます。</p>
      <hr>

    </header>

    <article>
      <h2>主な機能</h2>
      <ul>
        <li>トリッカル ビンゴイベント「イードの永遠の夢路」<br></li>
      </ul>

      <h2>使い方</h2>
      <ol>
        <li>上のメニューから項目を選択してください。</li>
        <li>選択した項目の HTML が下側に読み込まれます。</li>
      </ol>
    </article>

    <footer>
      <p>最終更新: <time datetime="2026-03-29">2026-03-29</time></p>
    </footer>
  </main>

  <script>
    (function () {
      // This script listens for theme messages from parent and adjusts local theme.
      function applyTheme(theme) {
        if (theme === 'dark') {
          document.documentElement.setAttribute('data-theme', 'dark');
          const meta = document.querySelector('meta[name="theme-color"]');
          if (meta) meta.setAttribute('content', '#071025');
        } else {
          document.documentElement.removeAttribute('data-theme');
          const meta = document.querySelector('meta[name="theme-color"]');
          if (meta) meta.setAttribute('content', '#f7f8fb');
        }
      }

      // respond to parent messages
      window.addEventListener('message', (ev) => {
        try {
          if (ev.origin !== location.origin) return;
        } catch (err) {}
        const data = ev.data || {};
        if (data && data.type === 'theme') {
          applyTheme(data.theme);
        }
        if (data && data.type === 'request-height') {
          // send height back to parent
          const h = document.documentElement.scrollHeight || document.body.scrollHeight;
          parent.postMessage({ type: 'resize', height: h }, location.origin);
        }
      });

      // on load, request theme from parent and send initial height
      window.addEventListener('load', () => {
        try { parent.postMessage({ type: 'request-theme' }, location.origin); } catch (err) {}
        const h = document.documentElement.scrollHeight || document.body.scrollHeight;
        try { parent.postMessage({ type: 'resize', height: h }, location.origin); } catch (err) {}
      });

      // observe DOM changes to update height dynamically
      const ro = new MutationObserver(() => {
        const h = document.documentElement.scrollHeight || document.body.scrollHeight;
        try { parent.postMessage({ type: 'resize', height: h }, location.origin); } catch (err) {}
      });
      ro.observe(document.body, { childList: true, subtree: true, attributes: true, characterData: true });
    })();
  </script>
</body>
</html>
