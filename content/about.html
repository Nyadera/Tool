    <h1>概要</h1>
    <p>このページは Tool プロジェクトの概要を説明します。</p>

  <article>
    <h2>目的</h2>
    <p>ウェブ上で公開するツール群をまとめるためのものです。各ツールは左メニューから選択して右側に表示されます。</p>

    <h2>主な機能</h2>
    <ul>
      <li>複数ツールの一覧表示</li>
      <li>クリックでコンテンツを非同期読み込み</li>
    </ul>

    <h2>使い方</h2>
    <ol>
      <li>左のメニューから項目を選択してください。</li>
      <li>選択した項目の HTML が右側に読み込まれます。</li>
    </ol>
  </article>
