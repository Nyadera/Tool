<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Tool</title>
  <style>
    :root{
      --sidebar-w: 260px;
      --gap: 16px;
      --bg: #f7f8fb;
      --accent: #2563eb;
      --text: #111827;
    }
    html,body{height:100%;margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,"Hiragino Kaku Gothic ProN", "Noto Sans JP", sans-serif;color:var(--text);}
    .wrap{display:flex;height:100vh;background:var(--bg);}
    /* サイドバー */
    .sidebar{
      width:var(--sidebar-w);
      min-width:200px;
      background:#fff;
      border-right:1px solid #e6e9ef;
      padding:20px;
      box-sizing:border-box;
      overflow:auto;
    }
    .brand{font-weight:700;color:var(--accent);margin-bottom:12px;}
    .menu{list-style:none;padding:0;margin:0;display:flex;flex-direction:column;gap:6px;}
    .menu a{
      display:block;padding:10px 12px;border-radius:8px;color:#374151;text-decoration:none;
    }
    .menu a.active{background:linear-gradient(90deg, rgba(37,99,235,0.08), transparent);color:var(--accent);font-weight:600;}
    /* コンテンツ */
    .content{
      flex:1;padding:20px;box-sizing:border-box;overflow:auto;
    }
    /* モバイル対応 */
    @media (max-width:800px){
      .wrap{flex-direction:column;}
      .sidebar{width:100%;min-width:0;border-right:0;border-bottom:1px solid #e6e9ef;display:flex;align-items:center;gap:12px;}
      .menu{flex-direction:row;overflow:auto;}
      .menu a{white-space:nowrap;}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <aside class="sidebar" role="navigation" aria-label="ツールメニュー">
      <div class="brand">Tool</div>
      <ul class="menu" id="menu">
        <li><a href="#" data-file="content/puzzle_simulator_new.html" class="active">ホーム</a></li>
        <li><a href="#" data-file="content/about.html">概要</a></li>
        <li><a href="#" data-file="content/usage.html">使い方</a></li>
        <li><a href="#" data-file="content/api.html">API</a></li>
        <li><a href="#" data-file="content/contact.html">連絡先</a></li>
      </ul>
    </aside>

    <main class="content" id="content" tabindex="0" aria-live="polite">
      <!-- 初期表示 -->
      <h2>読み込み中…</h2>
      <p>左のメニューから項目を選んでください。</p>
    </main>
  </div>

  <script>
    // メニュークリックで右側に HTML を読み込むシンプルなローダー
    const menu = document.getElementById('menu');
    const content = document.getElementById('content');

    async function loadFile(path, pushHistory = true) {
      try {
        content.innerHTML = '<h2>読み込み中…</h2>';
        const res = await fetch(path);
        if (!res.ok) throw new Error('読み込み失敗: ' + res.status);
        const html = await res.text();
        content.innerHTML = html;
        if (pushHistory) history.pushState({path}, '', '#' + path);
      } catch (err) {
        content.innerHTML = '<h2>読み込みエラー</h2><p>' + err.message + '</p>';
      }
    }

    // メニューのイベント
    menu.addEventListener('click', (e) => {
      const a = e.target.closest('a[data-file]');
      if (!a) return;
      e.preventDefault();
      // active クラス切替
      menu.querySelectorAll('a').forEach(x => x.classList.remove('active'));
      a.classList.add('active');
      const file = a.dataset.file;
      loadFile(file);
    });

    // 初期表示: URL ハッシュがあればそれを読み込む
    window.addEventListener('load', () => {
      const hash = location.hash.replace('#','');
      if (hash) {
        // ハッシュに対応するメニューがあれば active にする
        const link = menu.querySelector(`a[data-file="${hash}"]`);
        if (link) link.classList.add('active');
        loadFile(hash, false);
      } else {
        // デフォルトを読み込む
        const defaultFile = menu.querySelector('a[data-file]').dataset.file;
        loadFile(defaultFile, false);
      }
    });

    // 戻るボタン対応
    window.addEventListener('popstate', (e) => {
      const path = (e.state && e.state.path) || location.hash.replace('#','');
      if (path) {
        // メニューの active を更新
        menu.querySelectorAll('a').forEach(x => x.classList.toggle('active', x.dataset.file === path));
        loadFile(path, false);
      }
    });
  </script>
</body>
</html>
