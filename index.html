<!doctype html>
<html lang="ja" data-theme="">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Tool</title>
  <meta name="theme-color" content="#f7f8fb" id="meta-theme-color" />
  <style>
    :root{
      --nav-h: 64px;
      --gap: 12px;
      /* Light mode defaults */
      --bg: #f7f8fb;
      --surface: #ffffff;
      --muted-surface: #f1f3f8;
      --accent: #2563eb;
      --text: #111827;
      --muted-text: #6b7280;
      --border: #e6e9ef;
      --frame-bg: #ffffff;
      --shadow: 0 1px 2px rgba(16,24,40,0.04);
    }

    /* Dark theme variables */
    :root[data-theme="dark"]{
      --bg: #0b1020;
      --surface: #0f1724;
      --muted-surface: #0b1220;
      --accent: #60a5fa;
      --text: #e6eef8;
      --muted-text: #9aa6b2;
      --border: rgba(255,255,255,0.06);
      --frame-bg: #071025;
      --shadow: 0 1px 2px rgba(2,6,23,0.6);
    }

    html,body{height:100%;margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,"Hiragino Kaku Gothic ProN","Noto Sans JP",sans-serif;color:var(--text);background:var(--bg);}
    .wrap{display:flex;flex-direction:column;min-height:100vh;background:linear-gradient(180deg, transparent, transparent);}

    /* トップナビ */
    header.topbar{
      height:var(--nav-h);
      background:var(--surface);
      border-bottom:1px solid var(--border);
      display:flex;
      align-items:center;
      padding:0 16px;
      box-sizing:border-box;
      gap:12px;
      box-shadow:var(--shadow);
    }
    .brand{font-weight:700;color:var(--accent);font-size:1.1rem;}
    nav.menu-wrap{flex:1;display:flex;align-items:center;justify-content:flex-start;overflow:auto;}
    .menu{list-style:none;padding:0;margin:0;display:flex;gap:8px;align-items:center;}
    .menu a{
      display:inline-block;padding:8px 12px;border-radius:8px;color:var(--muted-text);text-decoration:none;white-space:nowrap;
      background:transparent;
    }
    .menu a:hover{background:linear-gradient(90deg, rgba(37,99,235,0.04), transparent);}
    .menu a.active{background:linear-gradient(90deg, rgba(37,99,235,0.08), transparent);color:var(--accent);font-weight:600;}

    /* トグル */
    .controls{display:flex;align-items:center;gap:8px;}
    .theme-toggle{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      width:40px;height:40px;
      border-radius:8px;
      background:var(--muted-surface);
      border:1px solid var(--border);
      color:var(--muted-text);
      cursor:pointer;
    }
    .theme-toggle:focus{outline:3px solid rgba(37,99,235,0.12);outline-offset:2px;}

    /* コンテンツ */
    main.content{
      flex:1;padding:20px;box-sizing:border-box;overflow:auto;
      background:transparent;
    }
    /* iframe styling */
    .frame-wrap {
      background:var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 8px;
      box-sizing: border-box;
      box-shadow:var(--shadow);
    }
    iframe#tool-frame {
      width: 100%;
      height: 820px;
      border: 0;
      border-radius: 6px;
      display: block;
      background: var(--frame-bg);
      color-scheme: light dark;
    }

    /* モバイル対応: メニューを折り返す */
    @media (max-width:800px){
      header.topbar{flex-wrap:wrap;height:auto;padding:12px;}
      .menu{flex-wrap:wrap;gap:6px;}
      iframe#tool-frame { height: 640px; }
    }

    /* 小さなアクセシビリティ調整 */
    .sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0;}
  </style>
</head>
<body>
  <div class="wrap">
    <header class="topbar" role="banner">
      <div class="brand">Tool</div>
      <nav class="menu-wrap" role="navigation" aria-label="ツールメニュー">
        <ul class="menu" id="menu">
          <li><a href="#content/about.html" data-file="content/about.html" class="active" aria-current="page">概要</a></li>
          <li><a href="#content/puzzle_simulator_new.html" data-file="content/puzzle_simulator_new.html" title="トリッカル ビンゴイベント — イードの永遠の夢路">トリッカル ビンゴイベント「イードの永遠の夢路」</a></li>
          <li><a href="#content/contact.html" data-file="content/contact.html">連絡先</a></li>
        </ul>
      </nav>

      <div class="controls">
        <button id="theme-toggle" class="theme-toggle" aria-pressed="false" title="ダークモード切替" aria-label="ダークモード切替">
          <!-- アイコンは CSS で色が変わる -->
          <svg id="icon-sun" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="12" cy="12" r="4"></circle>
            <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"></path>
          </svg>
          <svg id="icon-moon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" style="display:none">
            <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"></path>
          </svg>
        </button>
      </div>
    </header>

    <main class="content" id="content" tabindex="0" aria-live="polite">
      <div class="frame-wrap" id="frame-wrap">
        <iframe id="tool-frame" src="content/about.html" title="Tool content" sandbox="allow-same-origin allow-scripts allow-forms"></iframe>
      </div>
    </main>
  </div>

  <script>
    (function () {
      const menu = document.getElementById('menu');
      const frame = document.getElementById('tool-frame');
      const frameWrap = document.getElementById('frame-wrap');
      const themeToggle = document.getElementById('theme-toggle');
      const root = document.documentElement;
      const metaTheme = document.getElementById('meta-theme-color');
      const ICON_SUN = document.getElementById('icon-sun');
      const ICON_MOON = document.getElementById('icon-moon');

      /* ---------- Theme handling ---------- */
      const THEME_KEY = 'site-theme'; // 'light' | 'dark' | 'system'
      function getPreferredTheme() {
        const saved = localStorage.getItem(THEME_KEY);
        if (saved === 'light' || saved === 'dark') return saved;
        // default: follow system preference
        return window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      }

      function applyTheme(theme, persist = false) {
        if (!theme) theme = getPreferredTheme();
        root.setAttribute('data-theme', theme === 'dark' ? 'dark' : '');
        // update meta theme-color for mobile UI
        metaTheme.setAttribute('content', theme === 'dark' ? '#071025' : '#f7f8fb');
        // update toggle aria and icon
        const isDark = theme === 'dark';
        themeToggle.setAttribute('aria-pressed', String(isDark));
        ICON_SUN.style.display = isDark ? 'none' : '';
        ICON_MOON.style.display = isDark ? '' : 'none';
        // notify iframe(s) of theme change (same-origin)
        postThemeToFrame(theme);
        if (persist) localStorage.setItem(THEME_KEY, theme);
      }

      function toggleTheme() {
        const current = root.getAttribute('data-theme') === 'dark' ? 'dark' : 'light';
        const next = current === 'dark' ? 'light' : 'dark';
        applyTheme(next, true);
      }

      function postThemeToFrame(theme) {
        try {
          frame.contentWindow.postMessage({ type: 'theme', theme }, location.origin);
        } catch (err) {
          // ignore
        }
      }

      // initialize theme on load
      (function initTheme() {
        // if user explicitly set preference in localStorage, use it; otherwise follow system
        const saved = localStorage.getItem(THEME_KEY);
        const initial = saved === 'light' || saved === 'dark' ? saved : (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        applyTheme(initial, false);
      })();

      // allow system changes to update theme when user hasn't explicitly set one
      if (window.matchMedia) {
        window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', (e) => {
          const saved = localStorage.getItem(THEME_KEY);
          if (saved !== 'light' && saved !== 'dark') {
            applyTheme(e.matches ? 'dark' : 'light', false);
          }
        });
      }

      themeToggle.addEventListener('click', (e) => {
        toggleTheme();
      });

      themeToggle.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' || e.key === ' ') {
          e.preventDefault();
          toggleTheme();
        }
      });

      /* ---------- Menu / iframe navigation ---------- */
      function setActiveLink(path) {
        menu.querySelectorAll('a').forEach(a => {
          const isActive = a.dataset.file === path;
          a.classList.toggle('active', isActive);
          if (isActive) a.setAttribute('aria-current', 'page');
          else a.removeAttribute('aria-current');
        });
      }

      function loadIntoFrame(path, pushHistory = true) {
        if (!path) return;
        // avoid unnecessary reload if same path
        const current = frame.getAttribute('src') || '';
        if (current.endsWith(path)) {
          if (pushHistory) history.pushState({ path }, '', '#' + path);
          setActiveLink(path);
          // still send theme to ensure iframe matches
          postThemeToFrame(root.getAttribute('data-theme') === 'dark' ? 'dark' : 'light');
          return;
        }
        frame.setAttribute('src', path);
        if (pushHistory) history.pushState({ path }, '', '#' + path);
        setActiveLink(path);
      }

      menu.addEventListener('click', (e) => {
        const a = e.target.closest('a[data-file]');
        if (!a) return;
        e.preventDefault();
        const file = a.dataset.file;
        loadIntoFrame(file);
      });

      window.addEventListener('load', () => {
        const hash = location.hash.replace('#','');
        if (hash) {
          const link = menu.querySelector(`a[data-file="${hash}"]`);
          if (link) setActiveLink(hash);
          loadIntoFrame(hash, false);
        } else {
          const defaultFile = menu.querySelector('a[data-file]').dataset.file;
          setActiveLink(defaultFile);
          loadIntoFrame(defaultFile, false);
        }
      });

      window.addEventListener('popstate', (e) => {
        const path = (e.state && e.state.path) || location.hash.replace('#','');
        if (path) {
          loadIntoFrame(path, false);
        }
      });

      /* ---------- Message handling from iframe ---------- */
      window.addEventListener('message', (ev) => {
        // same-origin check
        try {
          if (ev.origin !== location.origin) return;
        } catch (err) {
          // ignore
        }
        const data = ev.data || {};
        if (data && data.type === 'resize' && typeof data.height === 'number') {
          const newH = Math.max(200, data.height + 24);
          frame.style.height = newH + 'px';
        }
        // iframe can request current theme
        if (data && data.type === 'request-theme') {
          postThemeToFrame(root.getAttribute('data-theme') === 'dark' ? 'dark' : 'light');
        }
      });

      /* ---------- iframe load/error handling ---------- */
      frame.addEventListener('load', () => {
        // when iframe loads, send current theme and request its height
        postThemeToFrame(root.getAttribute('data-theme') === 'dark' ? 'dark' : 'light');
        try {
          frame.contentWindow.postMessage({ type: 'request-height' }, location.origin);
        } catch (err) {}
      });

      frame.addEventListener('error', () => {
        frameWrap.innerHTML = '<div style="padding:24px;color:var(--text);background:var(--surface);border-radius:8px;">コンテンツの読み込みに失敗しました。ファイルが存在するか、パスを確認してください。</div>';
      });

      /* ---------- Accessibility: keyboard navigation for menu ---------- */
      menu.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
          const a = e.target.closest('a[data-file]');
          if (a) {
            e.preventDefault();
            loadIntoFrame(a.dataset.file);
          }
        }
      });
    })();
  </script>
</body>
</html>
