<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Tool</title>
  <style>
    :root{
      --nav-h: 64px;
      --gap: 12px;
      --bg: #f7f8fb;
      --accent: #2563eb;
      --text: #111827;
    }
    html,body{height:100%;margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,"Hiragino Kaku Gothic ProN","Noto Sans JP",sans-serif;color:var(--text);}
    .wrap{display:flex;flex-direction:column;min-height:100vh;background:var(--bg);}
    /* トップナビ */
    header.topbar{
      height:var(--nav-h);
      background:#fff;
      border-bottom:1px solid #e6e9ef;
      display:flex;
      align-items:center;
      padding:0 16px;
      box-sizing:border-box;
      gap:16px;
    }
    .brand{font-weight:700;color:var(--accent);font-size:1.1rem;}
    nav.menu-wrap{flex:1;display:flex;align-items:center;justify-content:flex-start;overflow:auto;}
    .menu{list-style:none;padding:0;margin:0;display:flex;gap:8px;align-items:center;}
    .menu a{
      display:inline-block;padding:8px 12px;border-radius:8px;color:#374151;text-decoration:none;white-space:nowrap;
    }
    .menu a.active{background:linear-gradient(90deg, rgba(37,99,235,0.08), transparent);color:var(--accent);font-weight:600;}
    /* コンテンツ */
    main.content{
      flex:1;padding:20px;box-sizing:border-box;overflow:auto;
    }
    /* iframe styling */
    .frame-wrap {
      background: #fff;
      border: 1px solid #e6e9ef;
      border-radius: 10px;
      padding: 8px;
      box-sizing: border-box;
    }
    iframe#tool-frame {
      width: 100%;
      height: 820px;
      border: 0;
      border-radius: 6px;
      display: block;
      background: white;
    }
    /* モバイル対応: メニューを折り返す */
    @media (max-width:800px){
      header.topbar{flex-wrap:wrap;height:auto;padding:12px;}
      .menu{flex-wrap:wrap;gap:6px;}
      iframe#tool-frame { height: 640px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header class="topbar" role="banner">
      <div class="brand">Tool</div>
      <nav class="menu-wrap" role="navigation" aria-label="ツールメニュー">
        <ul class="menu" id="menu">
          <li><a href="#content/about.html" data-file="content/about.html" class="active" aria-current="page">概要</a></li>
          <li><a href="#content/puzzle_simulator_new.html" data-file="content/puzzle_simulator_new.html" title="トリッカル ビンゴイベント — イードの永遠の夢路">トリッカル ビンゴイベント「イードの永遠の夢路」</a></li>
          <li><a href="#content/contact.html" data-file="content/contact.html">連絡先</a></li>
        </ul>
      </nav>
    </header>

    <main class="content" id="content" tabindex="0" aria-live="polite">
      <div class="frame-wrap" id="frame-wrap">
        <iframe id="tool-frame" src="content/about.html" title="Tool content"></iframe>
      </div>
    </main>
  </div>

  <script>
    (function () {
      const menu = document.getElementById('menu');
      const frame = document.getElementById('tool-frame');
      const frameWrap = document.getElementById('frame-wrap');

      // set active link visually and aria
      function setActiveLink(path) {
        menu.querySelectorAll('a').forEach(a => {
          const isActive = a.dataset.file === path;
          a.classList.toggle('active', isActive);
          if (isActive) a.setAttribute('aria-current', 'page');
          else a.removeAttribute('aria-current');
        });
      }

      // change iframe src safely
      function loadIntoFrame(path, pushHistory = true) {
        if (!path) return;
        // update src only if different to avoid reloads
        if (frame.src && frame.src.endsWith(path)) {
          // still update history/active
          if (pushHistory) history.pushState({ path }, '', '#' + path);
          setActiveLink(path);
          return;
        }
        frame.src = path;
        if (pushHistory) history.pushState({ path }, '', '#' + path);
        setActiveLink(path);
      }

      // menu click handler
      menu.addEventListener('click', (e) => {
        const a = e.target.closest('a[data-file]');
        if (!a) return;
        e.preventDefault();
        const file = a.dataset.file;
        loadIntoFrame(file);
      });

      // on load: respect hash or default
      window.addEventListener('load', () => {
        const hash = location.hash.replace('#','');
        if (hash) {
          const link = menu.querySelector(`a[data-file="${hash}"]`);
          if (link) setActiveLink(hash);
          loadIntoFrame(hash, false);
        } else {
          const defaultFile = menu.querySelector('a[data-file]').dataset.file;
          setActiveLink(defaultFile);
          loadIntoFrame(defaultFile, false);
        }
      });

      // popstate (back/forward)
      window.addEventListener('popstate', (e) => {
        const path = (e.state && e.state.path) || location.hash.replace('#','');
        if (path) {
          loadIntoFrame(path, false);
        }
      });

      // receive resize messages from iframe (same-origin check)
      window.addEventListener('message', (ev) => {
        try {
          if (ev.origin !== location.origin) return;
        } catch (err) {
          // ignore origin check errors
        }
        const data = ev.data || {};
        if (data && data.type === 'resize' && typeof data.height === 'number') {
          // add small padding so content isn't cramped
          const newH = Math.max(200, data.height + 24);
          frame.style.height = newH + 'px';
        }
      });

      // optional: if iframe fails to load (404), show a friendly message inside frame-wrap
      frame.addEventListener('error', () => {
        frameWrap.innerHTML = '<div style="padding:24px;color:#333;background:#fff;border-radius:8px;">コンテンツの読み込みに失敗しました。ファイルが存在するか、パスを確認してください。</div>';
      });

      // accessibility: allow keyboard navigation to switch menu items with Enter
      menu.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
          const a = e.target.closest('a[data-file]');
          if (a) {
            e.preventDefault();
            loadIntoFrame(a.dataset.file);
          }
        }
      });
    })();
  </script>
</body>
</html>
